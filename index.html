 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Kirar | Creative Developer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="preloader">
        <div class="loader-ring"></div>
        <div class="loader-text">Loading<span class="dots">...</span></div>
    </div>

    <canvas id="particle-canvas"></canvas>

    <header class="header">
        <nav class="navbar">
            <div class="logo"><span class="logo-bracket">&lt;</span>Aditya<span class="logo-accent">/&gt;</span></div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="contact" class="contact-section">
        <h2 class="section-title reveal">Get In Touch</h2>
        <div class="contact-wrapper reveal">
            <div class="contact-form-container">
                <form id="contact-form" action="https://formspree.io/f/mojzoeyp" method="POST">
                    <div class="form-group">
                        <input type="text" name="name" id="name" required placeholder=" ">
                        <label for="name">Your Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" name="email" id="email" required placeholder=" ">
                        <label for="email">Your Email</label>
                    </div>
                    <div class="form-group">
                        <textarea name="message" id="message" rows="4" required placeholder=" "></textarea>
                        <label for="message">Your Message</label>
                    </div>
                    <button type="submit" class="btn primary-btn submit-btn">
                        <span>Send Message</span>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
